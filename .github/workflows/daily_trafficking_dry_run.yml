name: Daily Trafficking Dry Run

on:
  schedule:
    # 17:00 UTC daily (adjust as needed)
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  run-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily dry run
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_WORKSPACE_GID: ${{ secrets.ASANA_WORKSPACE_GID }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          ASANA_DEDUPE_PROJECT_GIDS: ${{ secrets.ASANA_DEDUPE_PROJECT_GIDS }}

          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_SUBJECT_CONTAINS: ${{ secrets.GMAIL_SUBJECT_CONTAINS }}
          GMAIL_SEARCH_QUERY: ${{ secrets.GMAIL_SEARCH_QUERY }}
          GMAIL_PROCESSED_LABEL: ${{ secrets.GMAIL_PROCESSED_LABEL }}

          TRAFFICKING_SKIP_TOP_ROWS: ${{ secrets.TRAFFICKING_SKIP_TOP_ROWS }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          DRY_RUN_MODE: ${{ secrets.DRY_RUN_MODE }}
        run: python scripts/daily_trafficking_dry_run.py
